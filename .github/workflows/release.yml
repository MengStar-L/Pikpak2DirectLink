name: Release

# Publishes cross-compiled binaries to a GitHub Release whenever a version tag
# is pushed. The self-updater in internal/app/update.go downloads the asset that
# matches the running os/arch (named "Pikpak2DirectLink_<os>_<arch>") and
# verifies it against SHA256SUMS.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Run tests
        run: go test ./...

      - name: Build cross-platform binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          LDFLAGS="-s -w -X pikpak2directlink/internal/version.Version=${VERSION}"

          build() {
            local goos="$1" goarch="$2"
            local out="Pikpak2DirectLink_${goos}_${goarch}"
            if [ "$goos" = "windows" ]; then
              out="${out}.exe"
            fi
            echo "building ${out}"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath -ldflags "$LDFLAGS" -o "dist/${out}" ./cmd/server
          }

          build linux amd64
          build linux arm64
          build darwin amd64
          build darwin arm64
          build windows amd64

          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/Pikpak2DirectLink_*
            dist/SHA256SUMS
