<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>PikPak 直链工具 · 访问验证</title>
  <style>
    :root {
      --bg-app: #eef3f8;
      --surface: #ffffff;
      --surface-soft: #f6f9fc;
      --text-primary: #1f2a3d;
      --text-secondary: #5b6a82;
      --text-muted: #93a0b4;
      --border: #e6edf5;
      --border-strong: #d6e1ee;
      --primary: #0b6bff;
      --primary-hover: #0059dc;
      --primary-soft: #e8f2ff;
      --primary-line: #cfe2ff;
      --pink: #ef5aa8;
      --pink-soft: #fff0f8;
      --pink-line: #ffd2e8;
      --green: #22c88a;
      --orange: #f6a51a;
      --red: #f04d6e;
      --shadow-card: 0 30px 70px -28px rgba(20, 40, 80, 0.42);
      --focus-ring: rgba(11, 107, 255, 0.18);
      --ease: cubic-bezier(0.22, 0.85, 0.3, 1);
      color-scheme: light;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      position: relative;
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      background:
        radial-gradient(1100px 720px at 50% -8%, #ffffff 0%, rgba(255,255,255,0) 60%),
        linear-gradient(165deg, #eaf1fb 0%, var(--bg-app) 48%, #e7eef6 100%);
      color: var(--text-primary);
    }
    /* Soft floating colour blobs for depth */
    body::before,
    body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.55;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 460px; height: 460px;
      top: -160px; left: -120px;
      background: radial-gradient(circle at 30% 30%, #b7d4ff, transparent 70%);
      animation: drift-a 16s var(--ease) infinite alternate;
    }
    body::after {
      width: 420px; height: 420px;
      bottom: -170px; right: -110px;
      background: radial-gradient(circle at 70% 70%, #ffd6ec, transparent 70%);
      animation: drift-b 18s var(--ease) infinite alternate;
    }
    button, input { font: inherit; }

    .gate-card {
      position: relative;
      z-index: 1;
      width: min(100%, 432px);
      padding: 40px 36px 34px;
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(22px) saturate(135%);
      -webkit-backdrop-filter: blur(22px) saturate(135%);
      box-shadow: var(--shadow-card);
      animation: rise-in 460ms var(--ease) both;
    }

    .gate-header {
      display: grid;
      gap: 14px;
      text-align: center;
      margin-bottom: 26px;
    }
    .brand-mark {
      position: relative;
      width: 68px;
      height: 68px;
      margin: 2px auto 4px;
      display: grid;
      place-items: center;
      border-radius: 22px;
      background: linear-gradient(150deg, #2f86ff 0%, var(--primary) 55%, #0a4fd0 100%);
      color: #fff;
      box-shadow: 0 18px 34px -10px rgba(11, 107, 255, 0.6);
    }
    /* Pulsing halo behind the badge */
    .brand-mark::after {
      content: "";
      position: absolute;
      inset: -7px;
      border-radius: 27px;
      border: 1.5px solid var(--primary-line);
      opacity: 0;
      animation: halo 2.8s var(--ease) infinite;
    }
    .brand-mark svg { width: 32px; height: 32px; fill: none; stroke: currentColor; stroke-width: 2.1; stroke-linecap: round; stroke-linejoin: round; }
    h1 { margin: 0; font-size: 23px; line-height: 1.2; font-weight: 850; letter-spacing: -0.2px; }
    .gate-header p {
      margin: 0;
      min-height: 19px;
      color: var(--text-secondary);
      font-size: 13.5px;
      line-height: 1.5;
    }

    .hint {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 16px;
      padding: 13px 15px;
      border-radius: 16px;
      background: linear-gradient(180deg, #f0f7ff, var(--primary-soft));
      border: 1px solid var(--primary-line);
      color: #1257c7;
      font-size: 12.5px;
      font-weight: 650;
      line-height: 1.55;
    }
    .hint svg { width: 17px; height: 17px; flex: 0 0 auto; margin-top: 1px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    form { display: grid; gap: 14px; }
    .field { position: relative; display: grid; }
    .field input {
      width: 100%;
      height: 58px;
      padding: 22px 48px 8px 17px;
      border: 1.5px solid var(--border-strong);
      border-radius: 16px;
      background: var(--surface-soft);
      color: var(--text-primary);
      font-size: 14.5px;
      transition: background 180ms var(--ease), border-color 180ms var(--ease), box-shadow 180ms var(--ease);
    }
    .field input:focus {
      outline: none;
      background: #fff;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--focus-ring);
    }
    .field .label {
      position: absolute;
      left: 18px;
      top: 19px;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
      pointer-events: none;
      transition: transform 170ms var(--ease), color 170ms var(--ease), font-size 170ms var(--ease);
    }
    .field input:focus + .label,
    .field input:not(:placeholder-shown) + .label {
      transform: translateY(-11px);
      color: var(--primary);
      font-size: 11.5px;
      font-weight: 800;
    }
    /* Eye toggle */
    .toggle-visibility {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 150ms var(--ease), background 150ms var(--ease);
    }
    .toggle-visibility:hover { color: var(--primary); background: var(--primary-soft); }
    .toggle-visibility svg { width: 19px; height: 19px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .toggle-visibility .eye-off { display: none; }
    .toggle-visibility.is-visible .eye-on { display: none; }
    .toggle-visibility.is-visible .eye-off { display: block; }

    /* Password strength meter (setup mode only) */
    .strength {
      display: none;
      grid-template-columns: repeat(4, 1fr);
      align-items: center;
      gap: 6px;
      margin: -4px 2px 0;
    }
    .strength.show { display: grid; }
    .strength .bar {
      height: 5px;
      border-radius: 999px;
      background: var(--border-strong);
      transition: background 220ms var(--ease);
    }
    .strength .label {
      grid-column: 1 / -1;
      margin-top: 1px;
      font-size: 11.5px;
      font-weight: 750;
      color: var(--text-muted);
      transition: color 220ms var(--ease);
    }
    .strength[data-score="1"] .bar:nth-child(-n+1) { background: var(--red); }
    .strength[data-score="2"] .bar:nth-child(-n+2) { background: var(--orange); }
    .strength[data-score="3"] .bar:nth-child(-n+3) { background: #4cc3ff; }
    .strength[data-score="4"] .bar:nth-child(-n+4) { background: var(--green); }
    .strength[data-score="1"] .label { color: var(--red); }
    .strength[data-score="2"] .label { color: #d98200; }
    .strength[data-score="3"] .label { color: #1f8fd6; }
    .strength[data-score="4"] .label { color: #11a86f; }

    button.primary {
      margin-top: 4px;
      min-height: 56px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(180deg, #1f7bff, var(--primary));
      color: #fff;
      font-size: 14.5px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 16px 30px -10px rgba(11, 107, 255, 0.62);
      transition: filter 170ms var(--ease), box-shadow 170ms var(--ease), transform 120ms var(--ease), opacity 170ms var(--ease);
    }
    button.primary:hover:not(:disabled) { filter: brightness(1.06); box-shadow: 0 20px 36px -10px rgba(11, 107, 255, 0.7); }
    button.primary:active:not(:disabled) { transform: translateY(1px); }
    button.primary:disabled { cursor: not-allowed; opacity: 0.55; box-shadow: none; }
    button.primary svg { width: 19px; height: 19px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    button.primary.is-loading .btn-icon { display: none; }
    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255, 255, 255, 0.45);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    button.primary.is-loading .spinner { display: block; }

    .error {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      margin: 2px 0 0;
      padding: 12px 14px;
      border-radius: 14px;
      color: #c83067;
      background: var(--pink-soft);
      border: 1px solid var(--pink-line);
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
    }
    .error svg { width: 16px; height: 16px; flex: 0 0 auto; margin-top: 1px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .gate-foot {
      margin-top: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      color: var(--text-muted);
      font-size: 11.5px;
      font-weight: 600;
    }
    .gate-foot svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .hidden { display: none !important; }

    @keyframes rise-in {
      from { opacity: 0; transform: translateY(14px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes halo {
      0% { opacity: 0; transform: scale(0.92); }
      40% { opacity: 0.7; }
      100% { opacity: 0; transform: scale(1.18); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes drift-a {
      to { transform: translate(40px, 30px) scale(1.1); }
    }
    @keyframes drift-b {
      to { transform: translate(-36px, -28px) scale(1.08); }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
    }
    @media (max-width: 480px) {
      .gate-card { padding: 32px 22px 26px; border-radius: 26px; }
    }
  </style>
</head>
<body>
  <main class="gate-card">
    <div class="gate-header">
      <div class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M7 10V8a5 5 0 0 1 10 0v2"/>
          <path d="M6.4 10h11.2A2.4 2.4 0 0 1 20 12.4v6.2a2.4 2.4 0 0 1-2.4 2.4H6.4A2.4 2.4 0 0 1 4 18.6v-6.2A2.4 2.4 0 0 1 6.4 10Z"/>
          <path d="M12 15v2"/>
        </svg>
      </div>
      <h1>PikPak 直链工具</h1>
      <p id="gateSubtitle">正在检查访问状态…</p>
    </div>

    <div id="setupHint" class="hint hidden">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01"/><path d="M11 12h1v4h1"/></svg>
      <span>首次访问，请设置一个管理员密码。该密码将用于后续所有访问。</span>
    </div>

    <form id="gateForm" class="hidden" autocomplete="off">
      <div class="field">
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder=" " required>
        <span class="label" id="passwordLabel">访问密码</span>
        <button type="button" class="toggle-visibility" data-target="password" aria-label="显示密码">
          <svg class="eye-on" viewBox="0 0 24 24"><path d="M2.5 12S6 5.5 12 5.5 21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12Z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="eye-off" viewBox="0 0 24 24"><path d="M3 3l18 18"/><path d="M10.6 6.1A9.7 9.7 0 0 1 12 6c6 0 9.5 6 9.5 6a16 16 0 0 1-3 3.6"/><path d="M6.2 7.5A15.8 15.8 0 0 0 2.5 12S6 18 12 18a9.4 9.4 0 0 0 4-.86"/><path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"/></svg>
        </button>
      </div>

      <div id="strength" class="strength" aria-hidden="true">
        <span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span>
        <span class="label" id="strengthLabel"></span>
      </div>

      <div class="field hidden" id="confirmField">
        <input id="confirmPassword" name="confirm" type="password" autocomplete="new-password" placeholder=" ">
        <span class="label">确认密码</span>
        <button type="button" class="toggle-visibility" data-target="confirmPassword" aria-label="显示密码">
          <svg class="eye-on" viewBox="0 0 24 24"><path d="M2.5 12S6 5.5 12 5.5 21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12Z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="eye-off" viewBox="0 0 24 24"><path d="M3 3l18 18"/><path d="M10.6 6.1A9.7 9.7 0 0 1 12 6c6 0 9.5 6 9.5 6a16 16 0 0 1-3 3.6"/><path d="M6.2 7.5A15.8 15.8 0 0 0 2.5 12S6 18 12 18a9.4 9.4 0 0 0 4-.86"/><path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"/></svg>
        </button>
      </div>

      <button id="submitButton" type="submit" class="primary">
        <svg class="btn-icon" viewBox="0 0 24 24"><path d="M7 10V8a5 5 0 0 1 10 0v2"/><path d="M6.4 10h11.2A2.4 2.4 0 0 1 20 12.4v6.2a2.4 2.4 0 0 1-2.4 2.4H6.4A2.4 2.4 0 0 1 4 18.6v-6.2A2.4 2.4 0 0 1 6.4 10Z"/><path d="M12 15v2"/></svg>
        <span class="spinner" aria-hidden="true"></span>
        <span id="submitLabel">解锁进入</span>
      </button>
      <p id="gateError" class="error hidden"></p>
    </form>

    <div class="gate-foot">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3l7 3v5c0 4.4-3 7.6-7 9-4-1.4-7-4.6-7-9V6l7-3Z"/></svg>
      <span>本地凭据 · 加密存储</span>
    </div>
  </main>

  <script>
    (function () {
      var subtitle = document.getElementById('gateSubtitle');
      var setupHint = document.getElementById('setupHint');
      var form = document.getElementById('gateForm');
      var confirmField = document.getElementById('confirmField');
      var passwordInput = document.getElementById('password');
      var passwordLabel = document.getElementById('passwordLabel');
      var confirmInput = document.getElementById('confirmPassword');
      var submitButton = document.getElementById('submitButton');
      var submitLabel = document.getElementById('submitLabel');
      var errorBox = document.getElementById('gateError');
      var strength = document.getElementById('strength');
      var strengthLabel = document.getElementById('strengthLabel');

      var mode = 'login'; // 'login' | 'setup'

      var STRENGTH_TEXT = ['', '密码强度：弱', '密码强度：一般', '密码强度：良好', '密码强度：强'];

      function showError(message) {
        errorBox.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 8v4.5"/><path d="M12 16h.01"/></svg>';
        errorBox.appendChild(document.createTextNode(message));
        errorBox.classList.remove('hidden');
      }
      function clearError() {
        errorBox.textContent = '';
        errorBox.classList.add('hidden');
      }

      function scorePassword(value) {
        if (!value) return 0;
        var score = 0;
        if (value.length >= 6) score++;
        if (value.length >= 10) score++;
        if (/[a-z]/.test(value) && /[A-Z]/.test(value)) score++;
        if (/\d/.test(value) && /[^A-Za-z0-9]/.test(value)) score++;
        if (score === 0 && value.length > 0) score = 1;
        return Math.min(score, 4);
      }

      function updateStrength() {
        if (mode !== 'setup') return;
        var score = scorePassword(passwordInput.value);
        strength.setAttribute('data-score', String(score));
        strengthLabel.textContent = STRENGTH_TEXT[score] || '';
      }

      // Password visibility toggles.
      Array.prototype.forEach.call(document.querySelectorAll('.toggle-visibility'), function (btn) {
        btn.addEventListener('click', function () {
          var target = document.getElementById(btn.getAttribute('data-target'));
          if (!target) return;
          var show = target.type === 'password';
          target.type = show ? 'text' : 'password';
          btn.classList.toggle('is-visible', show);
          btn.setAttribute('aria-label', show ? '隐藏密码' : '显示密码');
          target.focus();
        });
      });

      function applyMode(configured) {
        mode = configured ? 'login' : 'setup';
        form.classList.remove('hidden');
        if (mode === 'setup') {
          subtitle.textContent = '设置访问密码以保护此工具';
          setupHint.classList.remove('hidden');
          confirmField.classList.remove('hidden');
          confirmInput.required = true;
          passwordLabel.textContent = '设置密码（至少 6 位）';
          passwordInput.setAttribute('autocomplete', 'new-password');
          submitLabel.textContent = '设置密码并进入';
          strength.classList.add('show');
          updateStrength();
        } else {
          subtitle.textContent = '输入访问密码后继续';
          setupHint.classList.add('hidden');
          confirmField.classList.add('hidden');
          confirmInput.required = false;
          passwordLabel.textContent = '访问密码';
          passwordInput.setAttribute('autocomplete', 'current-password');
          submitLabel.textContent = '解锁进入';
          strength.classList.remove('show');
        }
        passwordInput.focus();
      }

      passwordInput.addEventListener('input', updateStrength);

      function setLoading(loading) {
        submitButton.disabled = loading;
        submitButton.classList.toggle('is-loading', loading);
      }

      async function checkStatus() {
        try {
          var res = await fetch('/api/auth/status', { headers: { 'Accept': 'application/json' } });
          var data = await res.json();
          if (data.authenticated) {
            window.location.replace('/');
            return;
          }
          applyMode(Boolean(data.configured));
        } catch (e) {
          subtitle.textContent = '无法连接服务，请稍后重试';
          showError('网络错误：' + (e && e.message ? e.message : '未知错误'));
        }
      }

      async function submit(event) {
        event.preventDefault();
        clearError();

        var password = passwordInput.value;
        if (mode === 'setup') {
          if (password.length < 6) {
            showError('密码至少需要 6 位。');
            return;
          }
          if (password !== confirmInput.value) {
            showError('两次输入的密码不一致。');
            return;
          }
        } else if (!password) {
          showError('请输入访问密码。');
          return;
        }

        setLoading(true);
        var endpoint = mode === 'setup' ? '/api/auth/setup' : '/api/auth/login';
        try {
          var res = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: password }),
          });
          var payload = null;
          try { payload = await res.json(); } catch (e) {}
          if (!res.ok) {
            // If setup raced with another visitor, fall back to login.
            if (res.status === 409 && mode === 'setup') {
              applyMode(true);
              showError('密码已被设置，请直接登录。');
              return;
            }
            throw new Error((payload && payload.error) || ('请求失败 (' + res.status + ')'));
          }
          window.location.replace('/');
        } catch (e) {
          showError(e && e.message ? e.message : '请求失败');
        } finally {
          setLoading(false);
        }
      }

      form.addEventListener('submit', submit);
      checkStatus();
    })();
  </script>
</body>
</html>
